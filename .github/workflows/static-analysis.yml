name: Static Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy-18

      - name: Configure
        env:
          CC: clang-18
          CXX: clang++-18
        run: cmake --preset release -DMALLOC_BUILD_TESTS=OFF -DMALLOC_BUILD_BENCHMARKS=OFF -DMALLOC_BUILD_EXAMPLES=OFF

      - name: Run clang-tidy
        run: |
          run-clang-tidy-18 -p build/release -quiet "$(pwd)/(src|include)/.*"
