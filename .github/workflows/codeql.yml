name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 4 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze C++
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          build-mode: manual

      - name: Build
        run: |
          cmake --preset release -DMALLOC_BUILD_TESTS=OFF -DMALLOC_BUILD_BENCHMARKS=OFF -DMALLOC_BUILD_EXAMPLES=OFF
          cmake --build --preset release --parallel

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:c-cpp'
