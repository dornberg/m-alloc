name: Question
description: Ask about usage, design or behavior
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: Please check the documentation in docs/ and existing issues first.
  - type: textarea
    id: question
    attributes:
      label: Question
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you building, and what have you tried?
